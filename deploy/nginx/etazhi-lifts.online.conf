server {
    listen 80;
    server_name etazhi-lifts.online www.etazhi-lifts.online;
    return 301 https://etazhi-lifts.online$request_uri;
}

server {
    listen 443 ssl;
    server_name etazhi-lifts.online www.etazhi-lifts.online;

    ssl_certificate /etc/letsencrypt/live/etazhi-lifts.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/etazhi-lifts.online/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 12m;

    location /static/ {
        alias /var/www/etazhi-lifts/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

